<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Quản lý Thư viện - LibZone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 h-screen flex overflow-hidden">

    <div class="w-64 bg-indigo-950 text-white flex flex-col h-full shadow-lg">
        <div class="p-6 text-2xl font-bold border-b border-indigo-800 flex items-center">
            <i class="fas fa-book-reader mr-3 text-yellow-400"></i> LibZone
        </div>
        <nav class="flex-grow p-4 space-y-1.5 overflow-y-auto">
            <a href="giaodien.html"
   class="menu-item flex items-center gap-3 py-3 px-4 rounded-lg hover:bg-indigo-800 cursor-pointer">
    <i class="fas fa-book w-5 text-center"></i> Trang chủ
            </a>
            <a href="book.html" 
            class="flex items-center gap-3 py-3 px-4 rounded-lg hover:bg-indigo-800 transition">
               <i class="fas fa-book w-5 text-center"></i> Quản lý Sách
            </a>
            <a href="Reader.html"
   class="menu-item flex items-center gap-3 py-3 px-4 rounded-lg hover:bg-indigo-800 cursor-pointer">
    <i class="fas fa-users w-5 text-center"></i> Quản lý Độc giả
</a>
            <a onclick="showPage('borrowPage', this)"
   class="menu-item flex items-center gap-3 py-3 px-4 rounded-lg hover:bg-indigo-800 cursor-pointer">
    <i class="fas fa-exchange-alt w-5 text-center"></i> Mượn / Trả sách
            </a>
            <div class="pt-4 border-t border-indigo-800"></div>
            <a href="#" class="flex items-center gap-3 py-3 px-4 rounded-lg hover:bg-indigo-800 transition text-gray-300 hover:text-white">
                <i class="fas fa-file-contract w-5 text-center"></i> Báo cáo
            </a>
            <a href="#" class="flex items-center gap-3 py-3 px-4 rounded-lg hover:bg-indigo-800 transition text-gray-300 hover:text-white">
                <i class="fas fa-cog w-5 text-center"></i> Cài đặt
            </a>
        </nav>
        <div class="p-4 border-t border-indigo-800 text-sm text-indigo-300 flex justify-between">
            <span>Phiên bản 1.0</span>
            <i class="fas fa-sign-out-alt cursor-pointer hover:text-white"></i>
        </div>
    </div>

    <div class="flex-1 flex flex-col overflow-hidden">
        <main class="flex-1 overflow-y-auto p-8">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h1 class="text-3xl font-bold text-gray-800 tracking-tight">Quản lý độc giả</h1>
                    <p class="text-gray-500">Danh sách tất cả độc giả đã đăng ký trong hệ thống</p>
                </div>
                <button onclick="openModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl shadow-lg flex items-center gap-2 transition-all active:scale-95 font-bold">
                    <i class="fas fa-plus text-sm"></i> Thêm độc giả
                </button>
            </div>

            <div class="bg-white p-2 rounded-2xl shadow-sm border border-gray-100 mb-8 max-w-2xl">
                <div class="relative">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input id="searchInput" type="text" placeholder="Tìm kiếm theo tên, email hoặc mã độc giả..." 
                        class="w-full pl-12 pr-4 py-3 bg-transparent outline-none text-gray-700">
                </div>
            </div>

            <div id="memberList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                </div>

            <div class="mt-10 flex justify-between items-center bg-white p-4 rounded-2xl border shadow-sm">
                <p id="memberInfo" class="text-gray-500 text-sm italic font-medium"></p>
                <div id="pageNumbers" class="flex gap-2"></div>
            </div>
        </main>
    </div>

    <div id="authorModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
        <div id="modalContainer" class="bg-white rounded-[24px] shadow-2xl w-full max-w-sm overflow-hidden transform scale-90 opacity-0 transition-all duration-300 p-8">
            
            <div class="flex justify-between items-start mb-8">
                <div class="flex gap-5 items-center">
                    <div>
                        <p id="modalNameDisplay" class="font-bold text-xl text-gray-900 leading-tight">Tên độc giả</p>
                        <p id="modalIdDisplay" class="text-gray-400 text-sm font-medium mt-1 uppercase tracking-wider">DG000</p>
                    </div>
                </div>
            </div>

            <div class="space-y-5">
                <input type="hidden" id="editId">
                
                <div class="space-y-1">
                    <label class="text-[11px] font-bold text-gray-400 uppercase ml-1">Họ tên đầy đủ</label>
                    <input type="text" id="inputName" class="w-full border-gray-100 border-2 p-3 rounded-xl outline-none focus:border-indigo-500 font-semibold transition-all" placeholder="Nguyễn Văn A...">
                </div>

                <div class="space-y-1">
                    <label class="text-[11px] font-bold text-gray-400 uppercase ml-1">Địa chỉ Email</label>
                    <div class="relative">
                        <i class="far fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="email" id="inputEmail" class="w-full border-gray-100 border-2 p-3 pl-11 rounded-xl outline-none focus:border-indigo-500 text-gray-600" placeholder="nguyenvana@email.com">
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-[11px] font-bold text-gray-400 uppercase ml-1">Số điện thoại</label>
                    <div class="relative">
                        <i class="fas fa-phone-alt absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                        <input type="text" id="inputPhone" class="w-full border-gray-100 border-2 p-3 pl-11 rounded-xl outline-none focus:border-indigo-500 text-gray-600 font-mono" placeholder="0901234567">
                    </div>
                </div>

                <div class="pt-6 border-t border-gray-50 flex justify-between items-center mt-6">
                    <div>
                        <p class="text-gray-400 text-xs font-bold uppercase">Số sách đang mượn</p>
                        <div class="flex items-center gap-2 mt-1">
                             <input type="number" id="inputBorrow" class="w-16 text-2xl font-black text-indigo-900 outline-none" value="0">
                             <span class="text-gray-500 font-medium">cuốn</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex gap-4 mt-8">
                <button onclick="closeModal()" class="flex-1 py-3.5 text-gray-500 font-bold hover:bg-gray-50 rounded-2xl transition">Hủy</button>
                <button onclick="saveMember()" class="flex-[1.5] py-3.5 bg-blue-600 text-white font-bold rounded-2xl hover:bg-blue-700 shadow-xl shadow-blue-100 transition active:scale-95">
                    Xác nhận
                </button>
            </div>
        </div>
    </div>

    <script>
        let members = [
            {id:"DG001", name:"Nguyễn Văn A", email:"nguyenvana@email.com", phone:"0901234567", borrow:3},
            {id:"DG002", name:"Trần Thị B", email:"tranthib@email.com", phone:"0902345678", borrow:1},
            {id:"DG003", name:"Lê Văn C", email:"levanc@email.com", phone:"0903456789", borrow:0,},
            {id:"DG004", name:"Phạm Thị D", email:"phamthid@email.com", phone:"0904567890", borrow:2},
        ];

        let currentPage = 1;
        const perPage = 6;

        function renderMembers() {
            const search = document.getElementById("searchInput").value.toLowerCase();
            const filtered = members.filter(m => m.name.toLowerCase().includes(search) || m.id.toLowerCase().includes(search));
            
            const list = filtered.slice((currentPage-1)*perPage, currentPage*perPage);
            let html = "";

            list.forEach(m => {

                html += `
                <div class="bg-white rounded-[24px] border border-gray-100 p-7 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300 relative group">
                    <div class="flex justify-between items-start mb-6">
                        <div class="flex gap-4 items-center">
                            <div class="w-14 h-14 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center font-bold text-xl uppercase border border-indigo-100">
                                ${m.name.charAt(0)}
                            </div>
                            <div>
                                <p class="font-bold text-gray-800 text-lg leading-tight">${m.name}</p>
                                <p class="text-gray-400 text-xs font-semibold mt-1 tracking-wider uppercase">${m.id}</p>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-3 mb-6">
                        <p class="text-gray-500 text-sm flex items-center gap-3">
                            <i class="far fa-envelope text-gray-300 w-4"></i> ${m.email}
                        </p>
                        <p class="text-gray-500 text-sm flex items-center gap-3">
                            <i class="fas fa-phone-alt text-gray-300 w-4 text-[12px]"></i> ${m.phone}
                        </p>
                    </div>

                    <div class="border-t border-gray-50 pt-5 flex justify-between items-end">
                        <div>
                            <p class="text-gray-400 text-[10px] font-bold uppercase tracking-widest">Đang mượn</p>
                            <p class="text-xl font-black text-indigo-900">${m.borrow} <span class="text-xs font-medium text-gray-400">cuốn</span></p>
                        </div>
                        <div class="flex gap-1">
                            <button onclick="openModal('${m.id}')" class="p-2.5 text-gray-400 hover:bg-indigo-50 hover:text-indigo-600 rounded-xl transition-all">
                                <i class="far fa-edit text-lg"></i>
                            </button>
                            <button onclick="deleteMember('${m.id}')" class="p-2.5 text-gray-400 hover:bg-red-50 hover:text-red-500 rounded-xl transition-all">
                                <i class="far fa-trash-alt text-lg"></i>
                            </button>
                        </div>
                    </div>
                </div>`;
            });

            document.getElementById("memberList").innerHTML = html || `<p class="col-span-full text-center py-20 text-gray-400 italic">Không tìm thấy kết quả nào...</p>`;
            document.getElementById("memberInfo").innerText = `Hiển thị ${list.length} / ${filtered.length} độc giả`;
            renderPagination(filtered.length);
        }

        function renderPagination(total) {
            let pages = Math.ceil(total/perPage);
            let html = "";
            for(let i=1; i<=pages; i++) {
                html += `
                <button onclick="goPage(${i})" 
                    class="w-10 h-10 rounded-xl font-bold transition-all ${i===currentPage ? 'bg-blue-600 text-white shadow-lg shadow-blue-200' : 'bg-white text-gray-400 border border-gray-100 hover:bg-gray-50'}">
                    ${i}
                </button>`;
            }
            document.getElementById("pageNumbers").innerHTML = html;
        }

        function goPage(p) { currentPage = p; renderMembers(); }
        function deleteMember(id) { if(confirm("Bạn có chắc muốn xóa độc giả này?")) { members = members.filter(m => m.id !== id); renderMembers(); } }

        // MODAL LOGIC
        function openModal(id = null) {
            const modal = document.getElementById("authorModal");
            const container = document.getElementById("modalContainer");
            modal.classList.remove("hidden");
            modal.classList.add("flex");
            
            // Animation hiện modal
            setTimeout(() => {
                container.classList.remove("scale-90", "opacity-0");
                container.classList.add("scale-100", "opacity-100");
            }, 10);

            if (id) {
                const m = members.find(item => item.id === id);
                document.getElementById("editId").value = m.id;
                document.getElementById("inputName").value = m.name;
                document.getElementById("inputEmail").value = m.email;
                document.getElementById("inputPhone").value = m.phone;
                document.getElementById("inputBorrow").value = m.borrow;
                

                document.getElementById("modalAvatarCircle").innerText = m.name.charAt(0).toUpperCase();
                document.getElementById("modalNameDisplay").innerText = m.name;
                document.getElementById("modalIdDisplay").innerText = m.id;
            } else {
                clearForm();
                document.getElementById("modalAvatarCircle").innerText = "?";
                document.getElementById("modalNameDisplay").innerText = "Độc giả mới";
                document.getElementById("modalIdDisplay").innerText = "Tự động sinh mã";
            }
        }

        function closeModal() {
            const modal = document.getElementById("authorModal");
            const container = document.getElementById("modalContainer");
            container.classList.add("scale-90", "opacity-0");
            setTimeout(() => {
                modal.classList.add("hidden");
            }, 300);
        }

        function clearForm() {
            document.getElementById("editId").value = "";
            document.getElementById("inputName").value = "";
            document.getElementById("inputEmail").value = "";
            document.getElementById("inputPhone").value = "";
            document.getElementById("inputBorrow").value = 0;
        }

        function saveMember() {
            const name = document.getElementById("inputName").value.trim();
            const editId = document.getElementById("editId").value;
            if (!name) return alert("Vui lòng nhập tên!");

            if (editId) {
                const i = members.findIndex(m => m.id === editId);
                members[i] = {
                    ...members[i],
                    name: name,
                    email: document.getElementById("inputEmail").value,
                    phone: document.getElementById("inputPhone").value,
                    borrow: parseInt(document.getElementById("inputBorrow").value) || 0
                };
            } else {
                const maxId = members.length > 0 ? Math.max(...members.map(m => parseInt(m.id.replace("DG", "")))) : 0;
                members.push({
                    id: "DG" + (maxId + 1).toString().padStart(3, "0"),
                    name: name,
                    email: document.getElementById("inputEmail").value || "new@email.com",
                    phone: document.getElementById("inputPhone").value || "0900000000",
                    borrow: parseInt(document.getElementById("inputBorrow").value) || 0,
                    status: "active"
                });
            }
            renderMembers();
            closeModal();
        }

        document.getElementById("searchInput").addEventListener("input", () => { currentPage = 1; renderMembers(); });
        renderMembers();
    </script>
</body>
</html>
